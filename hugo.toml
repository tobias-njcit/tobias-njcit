baseURL = "https://tobias-njcit.github.io/"
languageCode = "en-us"
title = "Tobias @ NJCIT"
theme = "PaperMod"
[pagination]
  pagerSize = 5

[params]
  defaultTheme = "dark"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  description = "Deep learning, fintech, and life as a student — from NJCIT to Tokyo."

  [params.homeInfoParams]
    Title = "Hi, I'm Tobias"
    Content = "Second-year student at NJCIT. Interested in deep learning and fintech. Currently learning Python and planning an exchange to Tokyo."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/tobias-njcit"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
